<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#14181D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ledger — Training Log</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   LEDGER — a training log built to be used one-handed, in a gym,
   between sets, with sweaty hands and bad lighting.
   Signature: every set you finish fills a block. The work stacks up
   in front of you. An exercise is done when its row is solid.
   ───────────────────────────────────────────────────────────── */
:root{
  --ink:#14181D;        /* base */
  --surface:#191E25;    /* cards */
  --raised:#212832;     /* inputs, steppers */
  --line:#2C343E;       /* hairlines */
  --line-2:#3A4552;
  --text:#E8ECF1;
  --muted:#7E8A98;
  --dim:#5A6572;

  --amber:#FFB020;      /* the work colour. logged, done, PR */
  --amber-dim:#8A5F14;
  --teal:#00C2A8;       /* gain, progress, up */
  --coral:#FF5C5C;      /* miss, warning, down */
  --violet:#8B7CF6;     /* body / composition */

  --legs:#00C2A8;
  --push:#4C9BE8;
  --pull:#B57CF6;
  --sprint:#FF6B4A;

  --r:12px;
  --tap:52px;           /* minimum thumb target */
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:15px;
  line-height:1.45;
  overscroll-behavior-y:contain;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
h1,h2,h3,.display{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;letter-spacing:-.02em;line-height:1.05}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}

/* ── shell ───────────────────────────────────────────────── */
#app{padding-top:calc(var(--safe-t) + 0px);padding-bottom:calc(84px + var(--safe-b));min-height:100%}
.wrap{max-width:640px;margin:0 auto;padding:0 14px}

header.top{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(to bottom,var(--ink) 72%,transparent);
  padding:calc(var(--safe-t) + 14px) 14px 12px;
}
.top-in{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.brand{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;letter-spacing:-.03em}
.brand em{font-style:normal;color:var(--amber)}
.top-meta{margin-left:auto;text-align:right;font-size:11px;color:var(--dim);line-height:1.3}
.top-meta b{display:block;color:var(--muted);font-weight:600}

/* ── tabs (thumb zone) ───────────────────────────────────── */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(20,24,29,.93);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  padding-bottom:var(--safe-b);
}
.tabs-in{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
.tab{
  height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  transition:color .15s;position:relative;
}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--amber)}
.tab.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2px;background:var(--amber);border-radius:0 0 3px 3px}

/* ── panels ──────────────────────────────────────────────── */
.panel{display:none;animation:in .22s ease}
.panel.on{display:block}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── hero / session header ───────────────────────────────── */
.hero{padding:6px 0 18px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.hero h1{font-size:clamp(30px,8.5vw,42px);margin-bottom:8px}
.hero h1 .accent{color:var(--amber)}
.hero-sub{color:var(--muted);font-size:13.5px}

.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.03em}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── card ────────────────────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;
}
.card.done{border-color:var(--amber-dim)}
.ex-head{display:flex;align-items:flex-start;gap:10px;padding:14px 14px 10px}
.ex-name{font-weight:600;font-size:15px;line-height:1.25;flex:1}
.ex-name .star{color:var(--amber)}
.ex-target{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.04em;white-space:nowrap;padding-top:2px}
.ex-last{padding:0 14px 10px;font-size:11.5px;color:var(--dim)}
.ex-last b{color:var(--muted);font-weight:500}
.ex-cue{padding:0 14px 12px;font-size:12px;color:var(--muted);line-height:1.4}

/* ── weight stepper ──────────────────────────────────────── */
.stepper{display:flex;align-items:stretch;gap:8px;padding:0 14px 12px}
.step-btn{
  width:var(--tap);height:var(--tap);flex:0 0 var(--tap);
  background:var(--raised);border:1px solid var(--line-2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:600;color:var(--text);
  transition:background .1s,transform .06s;
}
.step-btn:active{background:#2C3540;transform:scale(.95)}
.step-val{
  flex:1;height:var(--tap);background:var(--raised);border:1px solid var(--line-2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.step-val input{
  width:100%;background:none;border:none;text-align:center;
  font-family:'JetBrains Mono';font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;
  color:var(--amber);outline:none;
}
.step-val .unit{font-size:11px;color:var(--dim);font-weight:600;padding-right:12px}
.inc-sel{display:flex;gap:4px;padding:0 14px 12px}
.inc{
  padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;
  background:var(--raised);border:1px solid var(--line);color:var(--dim);
  font-family:'JetBrains Mono';
}
.inc.on{background:var(--amber);color:#14181D;border-color:var(--amber)}

/* ── SIGNATURE: set blocks ───────────────────────────────── */
.sets{display:flex;gap:6px;padding:0 14px 14px;flex-wrap:wrap}
.blk{
  flex:1;min-width:56px;height:56px;border-radius:9px;
  background:var(--raised);border:1.5px dashed var(--line-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:all .16s cubic-bezier(.2,.8,.2,1);position:relative;
}
.blk .n{font-family:'JetBrains Mono';font-size:19px;font-weight:700;color:var(--dim)}
.blk .lab{font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--dim);text-transform:uppercase}
.blk:active{transform:scale(.94)}
.blk.filled{
  background:var(--amber);border:1.5px solid var(--amber);border-style:solid;
  box-shadow:0 3px 14px -4px rgba(255,176,32,.5);
}
.blk.filled .n{color:#14181D}
.blk.filled .lab{color:#5C4008}
.blk.under{background:var(--coral);border-color:var(--coral);box-shadow:0 3px 14px -4px rgba(255,92,92,.45)}
.blk.under .n{color:#2A0B0B}
.blk.under .lab{color:#6B1F1F}
.blk.over{background:var(--teal);border-color:var(--teal);box-shadow:0 3px 14px -4px rgba(0,194,168,.45)}
.blk.over .n{color:#04231F}
.blk.over .lab{color:#0A4A41}

/* rep chooser */
.reps{display:flex;gap:6px;padding:0 14px 14px;flex-wrap:wrap;animation:in .16s}
.rep{
  min-width:44px;height:44px;padding:0 12px;border-radius:9px;
  background:var(--raised);border:1px solid var(--line-2);
  font-family:'JetBrains Mono';font-size:16px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
}
.rep:active{background:var(--amber);color:#14181D}
.rep.tgt{border-color:var(--amber);color:var(--amber)}
.rep.x{color:var(--dim);font-size:13px}

/* ── sticky rest timer ───────────────────────────────────── */
#rest{
  position:fixed;left:0;right:0;bottom:calc(64px + var(--safe-b));z-index:45;
  transform:translateY(120%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
}
#rest.up{transform:none}
.rest-in{
  max-width:640px;margin:0 auto 8px;padding:11px 14px;
  background:var(--amber);color:#14181D;border-radius:12px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 28px -8px rgba(255,176,32,.55);
  margin-left:14px;margin-right:14px;
}
.rest-t{font-family:'JetBrains Mono';font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.rest-l{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.rest-x{margin-left:auto;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;background:rgba(20,24,29,.14);border-radius:8px}

/* ── buttons ─────────────────────────────────────────────── */
.btn{
  width:100%;min-height:var(--tap);border-radius:11px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-weight:600;font-size:15px;letter-spacing:-.01em;
  transition:transform .06s,opacity .12s;
}
.btn:active{transform:scale(.985)}
.btn.primary{background:var(--amber);color:#14181D}
.btn.ghost{background:var(--surface);border:1px solid var(--line-2);color:var(--text)}
.btn.quiet{background:none;border:1px solid var(--line);color:var(--muted);min-height:44px;font-size:13px}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:8px}

/* ── notes ───────────────────────────────────────────────── */
textarea.notes{
  width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:13px;min-height:76px;resize:vertical;outline:none;font-size:14px;
}
textarea.notes:focus{border-color:var(--line-2)}
textarea.notes::placeholder{color:var(--dim)}

/* ── section label ───────────────────────────────────────── */
.sec{
  display:flex;align-items:center;gap:10px;
  margin:22px 0 11px;
}
.sec h2{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:'Inter'}
.sec .rule{flex:1;height:1px;background:var(--line)}
.sec .cnt{font-family:'JetBrains Mono';font-size:11px;color:var(--dim)}

/* ── history ─────────────────────────────────────────────── */
.hrow{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:7px;
}
.hrow .bar{width:3px;align-self:stretch;border-radius:3px;min-height:34px}
.hrow .m{flex:1;min-width:0}
.hrow .t{font-weight:600;font-size:14px}
.hrow .s{font-size:11.5px;color:var(--dim);font-family:'JetBrains Mono';margin-top:2px}
.hrow .v{text-align:right;font-family:'JetBrains Mono';font-size:12px;color:var(--muted)}
.hrow .v b{display:block;color:var(--text);font-size:15px;font-weight:700}
.hdetail{padding:0 14px 13px;font-size:12px;font-family:'JetBrains Mono';color:var(--muted);line-height:1.7;display:none}
.hdetail.on{display:block}
.hdetail .ln{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--line);padding:4px 0}
.hdetail .ln:last-child{border:none}
.hdetail .k{color:var(--text)}

/* ── charts ──────────────────────────────────────────────── */
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
.chart-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.chart-hd h3{font-size:15px;font-family:'Bricolage Grotesque';font-weight:700}
.chart-hd .delta{margin-left:auto;font-family:'JetBrains Mono';font-size:13px;font-weight:700}
.delta.up{color:var(--teal)} .delta.dn{color:var(--coral)} .delta.flat{color:var(--dim)}
.chart-sub{font-size:11.5px;color:var(--dim);margin-bottom:12px;font-family:'JetBrains Mono'}
svg.chart{width:100%;height:130px;display:block;overflow:visible}
select.pick{
  width:100%;background:var(--raised);border:1px solid var(--line-2);border-radius:10px;
  padding:12px 13px;font-size:14px;outline:none;margin-bottom:10px;
  min-height:var(--tap);
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' fill='none' stroke='%237E8A98' stroke-width='2'><path d='M1 1l5 5 5-5'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;
}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px}
.stat .l{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.stat .v{font-family:'JetBrains Mono';font-size:23px;font-weight:700;line-height:1}
.stat .d{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono'}

/* ── body form ───────────────────────────────────────────── */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.field input{
  width:100%;min-height:var(--tap);background:var(--raised);border:1px solid var(--line-2);
  border-radius:10px;padding:0 13px;outline:none;
  font-family:'JetBrains Mono';font-size:17px;font-weight:600;
}
.field input:focus{border-color:var(--amber)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── sync ────────────────────────────────────────────────── */
pre.digest{
  background:#0F1318;border:1px solid var(--line);border-radius:var(--r);
  padding:13px;font-family:'JetBrains Mono';font-size:11px;line-height:1.6;
  color:var(--muted);overflow-x:auto;white-space:pre;margin-bottom:10px;
  max-height:280px;overflow-y:auto;
}
.note{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:12px}
.note b{color:var(--text);font-weight:600}
.warn{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.28);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#FFC4C4;margin-bottom:12px;line-height:1.5}

/* ── toast ───────────────────────────────────────────────── */
#toast{
  position:fixed;left:50%;bottom:calc(90px + var(--safe-b));transform:translate(-50%,140%);
  background:var(--text);color:var(--ink);padding:11px 18px;border-radius:999px;
  font-size:13.5px;font-weight:600;z-index:80;white-space:nowrap;
  transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 8px 30px -8px rgba(0,0,0,.6);
}
#toast.up{transform:translate(-50%,0)}

.empty{text-align:center;padding:52px 20px;color:var(--dim)}
.empty .big{font-size:15px;color:var(--muted);margin-bottom:6px;font-weight:600}
.empty .sm{font-size:13px;line-height:1.5}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="brand">LED<em>G</em>ER</div>
    <div class="top-meta">
      <b id="mDate">—</b>
      <span id="mStreak">—</span>
    </div>
  </div>
</header>

<div id="app">
  <div class="wrap">

    <!-- ══════════ TODAY ══════════ -->
    <section class="panel on" id="p-today">
      <div class="hero">
        <div class="eyebrow" id="tEyebrow">Loading</div>
        <h1 id="tTitle">—</h1>
        <div class="hero-sub" id="tSub"></div>
      </div>
      <div id="tBody"></div>
    </section>

    <!-- ══════════ HISTORY ══════════ -->
    <section class="panel" id="p-hist">
      <div class="hero">
        <div class="eyebrow">Everything you've logged</div>
        <h1>History</h1>
      </div>
      <div id="hBody"></div>
    </section>

    <!-- ══════════ TRENDS ══════════ -->
    <section class="panel" id="p-trend">
      <div class="hero">
        <div class="eyebrow">Is the number going up</div>
        <h1>Trends</h1>
      </div>
      <div id="trBody"></div>
    </section>

    <!-- ══════════ BODY ══════════ -->
    <section class="panel" id="p-body">
      <div class="hero">
        <div class="eyebrow">The number that actually matters</div>
        <h1>Body</h1>
        <div class="hero-sub">Rescan every 4–6 weeks. Not weekly — the noise will mislead you.</div>
      </div>
      <div id="bBody"></div>
    </section>

    <!-- ══════════ SYNC ══════════ -->
    <section class="panel" id="p-sync">
      <div class="hero">
        <div class="eyebrow">Hand the data over</div>
        <h1>Sync</h1>
      </div>
      <div id="sBody"></div>
    </section>

  </div>
</div>

<div id="rest">
  <div class="rest-in">
    <div>
      <div class="rest-l">Rest</div>
      <div class="rest-t" id="restT">1:30</div>
    </div>
    <button class="rest-x" onclick="stopRest()">Skip</button>
  </div>
</div>

<div id="toast"></div>

<nav class="tabs">
  <div class="tabs-in">
    <button class="tab on" data-p="today">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 8h12M6 16h12M3 9v6M21 9v6"/></svg>
      Today
    </button>
    <button class="tab" data-p="hist">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      History
    </button>
    <button class="tab" data-p="trend">
      <svg viewBox="0 0 24 24"><path d="M3 17l5-6 4 3 5-7 4 4"/><path d="M3 21h18"/></svg>
      Trends
    </button>
    <button class="tab" data-p="body">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="3"/><path d="M6 21v-3a6 6 0 0112 0v3"/></svg>
      Body
    </button>
    <button class="tab" data-p="sync">
      <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0114-5m2 5a8 8 0 01-14 5"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>
      Sync
    </button>
  </div>
</nav>

<script>
/* ═══════════════════════════════════════════════════════════
   PROGRAM  —  Phase 1
   Codes are short on purpose: they keep the Claude digest tiny.
   ═══════════════════════════════════════════════════════════ */
const PROGRAM = {
  LA:{ name:'Lower A', full:'Lower A — Power & Strength', colour:'legs', gym:'RSL2', day:1,
    ex:[
      {k:'SQ', n:'Back Squat',            s:4, r:6,  w:75,  u:'lb', cue:'Your #1 priority. 0.44× bodyweight is where you start — not where you stay.'},
      {k:'BSS',n:'Bulgarian Split Squat', s:4, r:8,  w:20,  u:'+lb',cue:'Front heel drive, chest up. Your best leg lift — build on it.'},
      {k:'RDL',n:'Romanian Deadlift',     s:3, r:8,  w:65,  u:'lb', cue:'Back in the plan. Hinge at the hip, don\'t squat it. No more skipping this.'},
      {k:'WL', n:'Walking Lunges',        s:3, r:12, w:20,  u:'lb', cue:'Per leg. Long stride, controlled.'},
      {k:'SCR',n:'Standing Calf Raise ★', s:4, r:12, w:25,  u:'+lb',cue:'You have NEVER loaded these. Zero baseline = fastest gains in your body.'},
      {k:'SEC',n:'Seated Calf Raise',     s:3, r:15, w:45,  u:'lb', cue:'Bent knee hits soleus — a different muscle from the standing version.'},
      {k:'HLR',n:'Hanging Leg Raise',     s:3, r:12, w:0,   u:'+lb',cue:'Control the descent. No swinging.'},
    ]},
  SP:{ name:'Sprints', full:'Sprint Intervals', colour:'sprint', gym:'Track', day:2, cardio:true,
    ex:[
      {k:'SPR', n:'100m Sprints', s:1, r:8, w:0, u:'reps', cue:'85–90% effort. Walk back recovery (~90s). Start at 6 reps for weeks 1–2.'},
    ]},
  PU:{ name:'Push', full:'Push — Shoulder-dominant', colour:'push', gym:'RSL2', day:2,
    ex:[

   STORAGE  —  localStorage, with a memory fallback so the app
   still runs in sandboxed previews where storage is blocked.
   ═══════════════════════════════════════════════════════════ */
const KEY='ledger.v1';
let MEM=null, PERSISTS=true;
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    return raw?JSON.parse(raw):blank();
  }catch(e){
    PERSISTS=false;
    if(!MEM) MEM=blank();
    return MEM;
  }
}
function save(d){
  try{ localStorage.setItem(KEY,JSON.stringify(d)); }
  catch(e){ PERSISTS=false; MEM=d; }
}
function blank(){
  return { v:1, sessions:[], body:[
    {d:'2026-05-01', wt:160.6, bf:23.7, smm:68.8, waist:null, fer:14}
  ], lastSync:null, sheetUrl:null };
}

const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const iso=d=>d.toISOString().slice(0,10);
const today=()=>iso(new Date());
function ago(ds){
  const n=Math.round((new Date(today())-new Date(ds))/864e5);
  if(n===0)return'today'; if(n===1)return'yesterday'; if(n<7)return n+'d ago';
  if(n<30)return Math.round(n/7)+'w ago'; return Math.round(n/30)+'mo ago';
}
function fmtD(ds){
  const d=new Date(ds+'T12:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function toast(m){
  const t=$('#toast'); t.textContent=m; t.classList.add('up');
  clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('up'),1900);
}
function buzz(ms=12){ if(navigator.vibrate) try{navigator.vibrate(ms)}catch(e){} }
function lastOf(k){
  for(let i=DB.sessions.length-1;i>=0;i--){
    const e=DB.sessions[i].ex.find(x=>x.k===k);
    if(e && e.r.length) return {...e, d:DB.sessions[i].d};
  } return null;
}
function volume(s){
  return s.ex.reduce((t,e)=>{
    const setVols = e.r.map((r,i)=>{
      const w = e.ws ? (e.ws[i]||1) : (e.w||1);
      return r*w;
    });
    return t + setVols.reduce((a,v)=>a+v,0);
  },0);
}
function streak(){
  // consecutive weeks with >= 3 logged sessions
  const wk={};
  DB.sessions.forEach(s=>{
    const d=new Date(s.d+'T12:00'); const t=new Date(d);
    t.setDate(d.getDate()-((d.getDay()+6)%7)); // monday
    wk[iso(t)]=(wk[iso(t)]||0)+1;
  });
  const keys=Object.keys(wk).sort().reverse();
  let n=0; for(const k of keys){ if(wk[k]>=3) n++; else break; }
  return n;
}

      return {k:e.k, w:(l&&l.w!=null)?l.w:e.w, r:[]};
    }), n:'' };
}

function repOpts(t){
  const o=new Set();
  for(let v=Math.max(1,t-4);v<=t+4;v++)o.add(v);
  return [...o];
}
window.startSession=c=>{ newDraft(c); OPEN=null; draw(); buzz(); };
window.bump=(i,dir)=>{
  DRAFT.ex[i].w=Math.max(0,Math.round((DRAFT.ex[i].w+dir*INC)*10)/10);
  buzz(8); draw();
};
window.setW=(i,v)=>{ DRAFT.ex[i].w=Math.max(0,parseFloat(v)||0); draw(); };
window.openReps=(i,j)=>{ OPEN=i; draw(); };
window.logRep=(i,v)=>{
  const ex=DRAFT.ex[i];
  ex.r.push(v);
  // Track weight for each set
  if(!ex.ws) ex.ws=[];
  ex.ws.push(ex.w);
  const def=PROGRAM[DRAFT.s].ex.find(x=>x.k===DRAFT.ex[i].k);
  OPEN = DRAFT.ex[i].r.length>=def.s ? null : i;
  buzz(18); draw(); startRest();
};
window.clearSet=(i,j)=>{
  DRAFT.ex[i].r.splice(j,1);
  if(DRAFT.ex[i].ws) DRAFT.ex[i].ws.splice(j,1);
  buzz(8); draw();
};
window.finish=()=>{
  const logged=DRAFT.ex.filter(e=>e.r.length);
  if(!logged.length){ toast('Nothing logged yet'); return; }
  DB.sessions.push({...DRAFT, ex:logged});
  DB.sessions.sort((a,b)=>a.d.localeCompare(b.d));
  save(DB);
  const prs=checkPRs(DRAFT);
  DRAFT=null; OPEN=null; stopRest(); draw();
  toast(prs.length?`Saved · ${prs.length} PR${prs.length>1?'s':''} 🔥`:'Session saved');
  if(DB.sheetUrl) pushSheet();
};
function checkPRs(s){
  const prs=[];
  s.ex.forEach(e=>{
    if(!e.r.length)return;
    const curMax = e.ws ? Math.max(...e.ws) : (e.w||0);
    const prior=DB.sessions.filter(x=>x!==s && x.d<s.d)
      .flatMap(x=>x.ex.filter(y=>y.k===e.k))
      .map(y=> y.ws ? Math.max(...y.ws) : (y.w||0));
    if(prior.length && curMax>Math.max(...prior)) prs.push(e.k);
  });
  return prs;
}

/* ═══════════════════════════════════════════════════════════
   CHARTS  —  hand-rolled SVG. No library, no CDN, no weight.
   ═══════════════════════════════════════════════════════════ */
function lineChart(pts, colour, {fmt=v=>v, h=130}={}){
  if(pts.length<2) return `<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px">Need at least 2 data points</div>`;
  const W=320, H=h, pad={t:14,r:8,b:20,l:8};
  const xs=pts.map((_,i)=>i), ys=pts.map(p=>p.v);
  const y0=Math.min(...ys), y1=Math.max(...ys);
  const span=(y1-y0)||1, lo=y0-span*.18, hi=y1+span*.18;
  const X=i=>pad.l+(i/(pts.length-1))*(W-pad.l-pad.r);
  const Y=v=>pad.t+(1-(v-lo)/(hi-lo))*(H-pad.t-pad.b);
  const d=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join('');
  const area=`${d}L${X(pts.length-1).toFixed(1)},${H-pad.b}L${X(0).toFixed(1)},${H-pad.b}Z`;
  const id='g'+Math.random().toString(36).slice(2,7);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${colour}" stop-opacity=".26"/>
      <stop offset="100%" stop-color="${colour}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/>
    <path d="${d}" fill="none" stroke="${colour}" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    ${pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="${i===pts.length-1?3.6:2.2}"
        fill="${i===pts.length-1?colour:'var(--ink)'}" stroke="${colour}" stroke-width="1.6"/>`).join('')}
    <text x="${pad.l}" y="${H-5}" fill="#5A6572" font-size="9" font-family="JetBrains Mono">${pts[0].l}</text>
    <text x="${W-pad.r}" y="${H-5}" fill="#5A6572" font-size="9" font-family="JetBrains Mono" text-anchor="end">${pts.at(-1).l}</text>
  </svg>`;
}
function barChart(pts, colour, h=110){
  if(!pts.length) return '';
  const W=320,H=h,pad={t:12,b:20};
  const mx=Math.max(...pts.map(p=>p.v),1);
  const bw=(W/pts.length)*0.62, gap=(W/pts.length)*0.38;
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${h}px">
    ${pts.map((p,i)=>{
      const bh=Math.max(2,(p.v/mx)*(H-pad.t-pad.b));
      const x=i*(bw+gap)+gap/2;
      return `<rect x="${x.toFixed(1)}" y="${(H-pad.b-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}"
        rx="3" fill="${p.v>=3?colour:'#3A4552'}"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-6}" fill="#5A6572" font-size="8.5"
        font-family="JetBrains Mono" text-anchor="middle">${p.l}</text>`;
    }).join('')}
  </svg>`;
}

function renderTrends(){
  const b=$('#trBody');
  if(DB.sessions.length<1){
    b.innerHTML=`<div class="empty"><div class="big">No trends yet</div>
      <div class="sm">Log two sessions of the same lift and the line appears.</div></div>`;
    return;
  }
  const allK=[...new Set(DB.sessions.flatMap(s=>s.ex.map(e=>e.k)))];
  const nameOf=k=>{
    for(const p of Object.values(PROGRAM)){const e=p.ex.find(x=>x.k===k); if(e)return e.n.replace(' ★','');}
    return k;
  };
  const colOf=k=>{
    for(const [c,p] of Object.entries(PROGRAM)) if(p.ex.some(x=>x.k===k)) return COLOURS[p.colour];
    return '#FFB020';
  };
  if(!allK.includes(TRLIFT)) TRLIFT=allK[0];

  // lift progression
  const pts=DB.sessions.filter(s=>s.ex.some(e=>e.k===TRLIFT))
    .map(s=>{const e=s.ex.find(x=>x.k===TRLIFT);
      return {v:e.w, l:fmtD(s.d).replace(/^\w+, /,''), d:s.d};});
  const dl = pts.length>1 ? pts.at(-1).v-pts[0].v : 0;
  const dcls = dl>0?'up':dl<0?'dn':'flat';

  // weekly consistency (last 8 weeks)
  const wk={};
  DB.sessions.forEach(s=>{
    const d=new Date(s.d+'T12:00'),m=new Date(d);
    m.setDate(d.getDate()-((d.getDay()+6)%7));
    wk[iso(m)]=(wk[iso(m)]||0)+1;
  });
  const weeks=[]; const now=new Date(); const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  for(let i=7;i>=0;i--){
    const w=new Date(mon); w.setDate(mon.getDate()-i*7);
    weeks.push({l:`${w.getMonth()+1}/${w.getDate()}`, v:wk[iso(w)]||0});
  }

  // volume by group, last 4 weeks
  const cut=iso(new Date(Date.now()-28*864e5));
  const grp={legs:0,push:0,pull:0,sprint:0};
  DB.sessions.filter(s=>s.d>=cut).forEach(s=>{
    const c=PROGRAM[s.s]?.colour; if(c!=null) grp[c]+=s.ex.reduce((t,e)=>t+e.r.length,0);
  });
  const gtot=Object.values(grp).reduce((a,b)=>a+b,0)||1;

  b.innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="l">Sessions</div><div class="v">${DB.sessions.length}</div>
        <div class="d">${DB.sessions.length?ago(DB.sessions.at(-1).d):'—'} last</div></div>
      <div class="stat"><div class="l">Week streak</div><div class="v" style="color:var(--amber)">${streak()}</div>
        <div class="d">3+ sessions/wk</div></div>
    </div>

    <select class="pick" onchange="TRLIFT=this.value;draw()">
      ${allK.map(k=>`<option value="${k}" ${k===TRLIFT?'selected':''}>${nameOf(k)}</option>`).join('')}
    </select>

    <div class="chart-card">
      <div class="chart-hd">
        <h3>${nameOf(TRLIFT)}</h3>
        <span class="delta ${dcls}">${dl>0?'+':''}${dl} lb</span>
      </div>
      <div class="chart-sub">${pts.length} session${pts.length>1?'s':''} · now ${pts.at(-1)?.v ?? '—'} lb</div>
      ${lineChart(pts, colOf(TRLIFT))}
    </div>

    <div class="chart-card">
      <div class="chart-hd"><h3>Consistency</h3>
        <span class="delta ${weeks.at(-1).v>=3?'up':'dn'}">${weeks.at(-1).v} this wk</span></div>
      <div class="chart-sub">Sessions per week · bar goes solid at 3+</div>
      ${barChart(weeks,'#FFB020')}
    </div>

    <div class="chart-card">
      <div class="chart-hd"><h3>Where the work went</h3></div>
      <div class="chart-sub">Sets by muscle group · last 4 weeks</div>
      ${Object.entries(grp).map(([k,v])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
          <span style="width:52px;font-size:11px;color:var(--muted);text-transform:capitalize">${k}</span>
          <div style="flex:1;height:9px;background:var(--raised);border-radius:5px;overflow:hidden">
            <div style="height:100%;width:${(v/gtot*100).toFixed(0)}%;background:${COLOURS[k]};border-radius:5px"></div>
          </div>
          <span class="mono" style="width:34px;text-align:right;font-size:12px;color:var(--dim)">${v}</span>
        </div>`).join('')}
      <div style="font-size:11.5px;color:var(--dim);margin-top:10px;line-height:1.5">
        Legs should be the biggest bar. For 14 months it was the smallest — that's the thing this plan exists to fix.
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════
   BODY
   ═══════════════════════════════════════════════════════════ */
function renderBody(){

  const B=[...DB.body].sort((a,x)=>a.d.localeCompare(x.d));
  const cur=B.at(-1);
  const lean = cur ? (cur.wt*(1-cur.bf/100)) : 0;
  const fat  = cur ? (cur.wt*cur.bf/100) : 0;

  const wPts=B.filter(x=>x.wt).map(x=>({v:x.wt,l:fmtD(x.d).replace(/^\w+, /,'')}));
  const fPts=B.filter(x=>x.bf).map(x=>({v:x.bf,l:fmtD(x.d).replace(/^\w+, /,'')}));
  const bfD = fPts.length>1 ? +(fPts.at(-1).v-fPts[0].v).toFixed(1) : 0;

  b.innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="l">Body fat</div>
        <div class="v" style="color:var(--violet)">${cur?cur.bf:'—'}%</div>
        <div class="d">target 14%</div></div>
      <div class="stat"><div class="l">Weight</div>
        <div class="v">${cur?cur.wt:'—'}</div><div class="d">lb</div></div>
      <div class="stat"><div class="l">Fat mass</div>
        <div class="v" style="color:var(--coral)">${fat?fat.toFixed(1):'—'}</div><div class="d">lb</div></div>
      <div class="stat"><div class="l">Lean mass</div>
        <div class="v" style="color:var(--teal)">${lean?lean.toFixed(1):'—'}</div>
        <div class="d">protect this</div></div>
    </div>

    ${fPts.length>1?`<div class="chart-card">
      <div class="chart-hd"><h3>Body fat</h3>
        <span class="delta ${bfD<0?'up':bfD>0?'dn':'flat'}">${bfD>0?'+':''}${bfD}%</span></div>
      <div class="chart-sub">23.7% → 14% is the whole game</div>
      ${lineChart(fPts,'#8B7CF6')}
    </div>`:''}

    ${wPts.length>1?`<div class="chart-card">
      <div class="chart-hd"><h3>Weight</h3></div>
      <div class="chart-sub">Slow is fine. ~0.9 lb/wk means you're keeping muscle.</div>
      ${lineChart(wPts,'#7E8A98')}
    </div>`:''}

    <div class="sec"><h2>New scan</h2><div class="rule"></div></div>
    <div class="grid2">
      <div class="field"><label>Date</label><input id="bd" type="date" value="${today()}"></div>
      <div class="field"><label>Weight (lb)</label><input id="bw" type="number" inputmode="decimal" step="0.1" placeholder="160.6"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Body fat %</label><input id="bf" type="number" inputmode="decimal" step="0.1" placeholder="23.7"></div>
      <div class="field"><label>Muscle (lb)</label><input id="bs" type="number" inputmode="decimal" step="0.1" placeholder="68.8"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Waist (in)</label><input id="bwa" type="number" inputmode="decimal" step="0.1" placeholder="34"></div>
      <div class="field"><label>Ferritin</label><input id="bfe" type="number" inputmode="decimal" placeholder="14"></div>
    </div>
    <button class="btn primary" onclick="addScan()">Save scan</button>
    <div style="height:14px"></div>
    <div class="note"><b>Ferritin was 14.</b> Target is 70+. Log it every time you get bloods done — it caps everything else in this app.</div>

    ${B.length?`<div class="sec"><h2>Scans</h2><div class="rule"></div></div>
      ${[...B].reverse().map((x,i)=>`
      <div class="hrow">
        <div class="bar" style="background:var(--violet)"></div>
        <div class="m"><div class="t">${x.bf}% body fat</div>
          <div class="s">${fmtD(x.d)}${x.fer?` · ferritin ${x.fer}`:''}${x.waist?` · waist ${x.waist}"`:''}</div></div>
        <div class="v"><b>${x.wt}</b>lb</div>
      </div>`).join('')}`:''}

}
window.addScan=()=>{
  const g=id=>{const v=$('#'+id).value; return v===''?null:parseFloat(v)};
  const d=$('#bd').value, wt=g('bw'), bf=g('bf');
  if(!d||wt==null||bf==null){ toast('Date, weight and body fat are required'); return; }
  DB.body=DB.body.filter(x=>x.d!==d);
  DB.body.push({d, wt, bf, smm:g('bs'), waist:g('bwa'), fer:g('bfe')});
  DB.body.sort((a,b)=>a.d.localeCompare(b.d));
  save(DB); draw(); toast('Scan saved');
};

/* ═══════════════════════════════════════════════════════════
   SYNC  —  the compact digest is the whole point.
   A full week of training is ~400 tokens, not ~4,000.
   ═══════════════════════════════════════════════════════════ */
function digest(since){
  const ss=DB.sessions.filter(s=>!since||s.d>since);
  const bb=DB.body.filter(x=>!since||x.d>since);
  const L=[];
  L.push(`LEDGER v1 | ${since?`since ${since}`:'all time'} | generated ${today()}`);
  L.push(`FORMAT  S <date> <session> <gym>  then one line per lift: <code> <weight> <reps,comma>`);
  L.push(`        B <date> <weight> <bf%> <muscle> <waist> <ferritin>   ( - = not measured )`);
  L.push('');
  ss.forEach(s=>{
    L.push(`S ${s.d} ${s.s} ${s.g||'-'}`);
    s.ex.forEach(e=>L.push(`${e.k} ${e.w} ${e.r.join(',')}`));
    if(s.n) L.push(`# ${s.n}`);
  });
  if(bb.length){ L.push('');
    bb.forEach(x=>L.push(`B ${x.d} ${x.wt} ${x.bf} ${x.smm??'-'} ${x.waist??'-'} ${x.fer??'-'}`));
  }
  if(!ss.length && !bb.length) L.push('(nothing new)');
  return L.join('\n');
}
function renderSync(){
  const b=$('#sBody');
  const since=DB.lastSync;
  const d=digest(since);
  const est=Math.round(d.length/3.7);
  b.innerHTML=`
    ${!PERSISTS?`<div class="warn"><b>Preview mode.</b> Browser storage is blocked here, so nothing saves between reloads. Deploy to Netlify and it persists properly on your phone.</div>`:''}

    <div class="note">Tap <b>Copy for Claude</b> and paste it into the chat. The format is deliberately terse — a full week costs roughly <b>${est} tokens</b> instead of ten times that as raw JSON.</div>

    <button class="btn primary" onclick="copyDigest()">Copy for Claude</button>
    <div style="height:8px"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="DB.lastSync=null;save(DB);draw()">Export everything</button>
      <button class="btn ghost" onclick="markSynced()">Mark as sent</button>
    </div>

    <div class="sec"><h2>Preview</h2><div class="rule"></div>
      <div class="cnt">${since?`since ${since}`:'all time'}</div></div>
    <pre class="digest">${d.replace(/</g,'&lt;')}</pre>

    <div class="sec"><h2>Backup</h2><div class="rule"></div></div>
    <div class="note">Your data lives only on this phone. Download a backup now and then — if you clear your browser, it's gone.</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="dl()">Download backup</button>
      <button class="btn ghost" onclick="$('#imp').click()">Restore</button>
    </div>
    <input id="imp" type="file" accept="application/json" style="display:none" onchange="imp(this)">

    <div class="sec"><h2>Google Sheet (optional)</h2><div class="rule"></div></div>
    <div class="note">Paste an Apps Script URL and every saved session also appends to your Sheet — then Claude reads it straight from your Drive and you never paste anything. Setup steps are in <b>README.md</b>.</div>
    <div class="field"><label>Apps Script Web App URL</label>
      <input id="su" type="url" placeholder="https://script.google.com/macros/s/.../exec"
             value="${DB.sheetUrl||''}" style="font-size:13px"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="DB.sheetUrl=$('#su').value.trim()||null;save(DB);toast(DB.sheetUrl?'Sheet connected':'Sheet disconnected')">Save URL</button>
      <button class="btn ghost" onclick="restoreFromSheet()" ${!DB.sheetUrl?'disabled style="opacity:.5;cursor:not-allowed"':''}>Restore data</button>
    </div>
    <div style="height:24px"></div>`;
}
window.copyDigest=async()=>{
  const t=digest(DB.lastSync);
  try{ await navigator.clipboard.writeText(t); toast('Copied — paste it to Claude'); }
  catch(e){
    const a=document.createElement('textarea'); a.value=t; document.body.appendChild(a);
    a.select(); document.execCommand('copy'); a.remove(); toast('Copied');
  }
  buzz(20);
};
window.markSynced=()=>{ DB.lastSync=today(); save(DB); draw(); toast('Marked. Next export starts from today.'); };
window.dl=()=>{
  const b=new Blob([JSON.stringify(DB,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download=`ledger-${today()}.json`; a.click();
  toast('Backup downloaded');
};
window.imp=(el)=>{
  const f=el.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(!d.sessions) throw 0;
    DB=d; save(DB); draw(); toast('Restored');
  }catch(e){ toast('That file is not a Ledger backup'); } };
  r.readAsText(f);
};
async function pushSheet(){
  if(!DB.sheetUrl) return;
  const s=DB.sessions.at(-1);
  try{
    await fetch(DB.sheetUrl,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({type:'session',...s})});
  }catch(e){ /* silent — local save already succeeded */ }
}
window.restoreFromSheet=async()=>{
  if(!DB.sheetUrl){ toast('No sheet URL configured'); return; }
  try{
    const url=DB.sheetUrl.replace(/\/exec$/,'/exec?action=export');
    const resp=await fetch(url);
    if(!resp.ok) throw new Error(resp.statusText);
    const data=await resp.json();
    if(!data.sessions||!Array.isArray(data.sessions)) throw new Error('Invalid format');

    // Validate and fix dates
    data.sessions.forEach((s, i) => {
      if (!s.d || typeof s.d !== 'string') {
        console.warn(`Session ${i} has invalid date:`, s.d, 'full session:', s);
      }
      // Test if date is valid
      const testDate = new Date(s.d + 'T00:00:00Z');
      if (isNaN(testDate)) {
        console.warn(`Session ${i} date "${s.d}" is invalid format`);
      }
    });

    data.body.forEach((b, i) => {
      if (!b.d || typeof b.d !== 'string') {
        console.warn(`Body scan ${i} has invalid date:`, b.d, 'full record:', b);
      }
      const testDate = new Date(b.d + 'T00:00:00Z');
      if (isNaN(testDate)) {
        console.warn(`Body scan ${i} date "${b.d}" is invalid format`);
      }
    });

    // Deduplicate sessions by (date, session_code) pair
    const dedupedSessions = {};
    data.sessions.forEach(s => {
      const key = s.d + '|' + s.s;
      if (!dedupedSessions[key]) {
        dedupedSessions[key] = s;
      }
    });

    const sessions = Object.values(dedupedSessions);
    const count=sessions.length+data.body.length;
    if(confirm(`Restore ${sessions.length} sessions and ${data.body.length} scans from sheet? This will overwrite local data.`)){
      DB.sessions=sessions;
      DB.body=[...data.body];
      DB.sessions.sort((a,b)=>a.d.localeCompare(b.d));
      DB.body.sort((a,b)=>a.d.localeCompare(b.d));
      save(DB); draw(); toast(`Restored ${count} records from sheet`);
    }
  }catch(e){
    toast('Failed to restore: '+e.message);
    console.error('Restore error:', e);
    console.error('Check browser console for date details');
  }
}

/* ═══════════════════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════════════════ */
let TAB='today';
function draw(){
  $('#mDate').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const st=streak();
  $('#mStreak').textContent = st ? `${st} week streak` : 'no streak yet';
  $$('.panel').forEach(p=>p.classList.toggle('on', p.id==='p-'+TAB));
  $$('.tab').forEach(t=>t.classList.toggle('on', t.dataset.p===TAB));
  ({today:renderToday, hist:renderHist, trend:renderTrends, body:renderBody, sync:renderSync})[TAB]();
}
$$('.tab').forEach(t=>t.onclick=()=>{
  TAB=t.dataset.p; buzz(8); window.scrollTo(0,0); draw();
});
draw();
</script>
